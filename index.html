<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACRP S3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Rajdhani:wght@500;600;700&display=swap');

  :root{
    --ink:#05070d;
    --ink2:#0a0e18;
    --panel:#0d1320;
    --panel2:#101727;
    --line: rgba(120,160,255,0.12);
    --blue: #2f5fdc;
    --blue-bright:#5b8aff;
    --blue-dim: #1c3a8a;
    --silver:#c7d2e3;
    --text:#e7ecf7;
    --text-dim:#8b97b4;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--ink);
    color: var(--text);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  ::selection{ background: var(--blue); color:#fff; }

  .splash-screen{
    position:fixed; inset:0; z-index:500;
    background: radial-gradient(ellipse 120% 100% at 50% 30%, #143a9c 0%, #081c52 45%, #030712 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:30px;
    animation: splashIn .5s ease;
  }
  .splash-screen.splash-out{ animation: splashOut .6s ease forwards; }
  @keyframes splashIn{ from{ opacity:0; } to{ opacity:1; } }
  @keyframes splashOut{ from{ opacity:1; transform:scale(1); } to{ opacity:0; transform:scale(1.05); } }
  .splash-glow{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:520px; height:520px; border-radius:50%;
    background: radial-gradient(circle, rgba(120,160,255,0.35), transparent 70%);
    filter: blur(10px);
  }
  .splash-logo{
    width:120px; height:120px; object-fit:contain; position:relative; z-index:1;
    filter: drop-shadow(0 0 50px rgba(150,190,255,0.8));
    animation: splashPop .7s cubic-bezier(.2,.9,.3,1.3);
  }
  @keyframes splashPop{ from{ transform: scale(.5); opacity:0; } to{ transform: scale(1); opacity:1; } }
  .splash-title{
    position:relative; z-index:1; margin:20px 0 14px; font-weight:900;
    font-size: clamp(36px, 8vw, 60px); letter-spacing:3px;
    color:#fff; text-shadow: 0 0 30px rgba(150,190,255,0.6);
  }
  .splash-desc{
    position:relative; z-index:1; max-width:520px; color:#cfe0ff; font-size:15px; line-height:1.9; opacity:0.9;
  }
  .splash-loader{ position:relative; z-index:1; display:flex; gap:8px; margin-top:34px; }
  .splash-loader span{
    width:9px; height:9px; border-radius:50%; background:#fff;
    animation: splashDot 1s infinite ease-in-out;
  }
  .splash-loader span:nth-child(2){ animation-delay:.15s; }
  .splash-loader span:nth-child(3){ animation-delay:.3s; }
  @keyframes splashDot{ 0%,80%,100%{ opacity:.3; transform:scale(.8); } 40%{ opacity:1; transform:scale(1.2); } }


  /* ===== ANNOUNCEMENT BANNER ===== */
  .ann-banner{
    position:fixed; top:0; left:0; right:0; z-index:400;
    background: linear-gradient(90deg, #1a4fa8, #2f5fdc, #1a4fa8);
    color:#fff; font-size:15px; font-weight:700;
    padding:14px 60px 14px 20px;
    text-align:center; line-height:1.6;
    box-shadow: 0 4px 20px rgba(47,95,220,0.5);
    animation: annSlide .5s ease;
    white-space:pre-wrap;
  }
  @keyframes annSlide{ from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
  .ann-close{
    position:absolute; top:50%; right:16px; transform:translateY(-50%);
    width:30px; height:30px; border-radius:50%;
    background:rgba(255,255,255,0.2); color:#fff;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:16px; font-weight:700;
  }
  .ann-close:hover{ background:rgba(255,255,255,0.35); }
  .ann-spacer{ height:60px; }

  /* background watermark */
  .bg-logo{
    position:fixed; inset:0;
    background-image: var(--logo-url);
    background-repeat:no-repeat;
    background-position: center 38%;
    background-size: 720px;
    opacity:0.05;
    filter: saturate(0) brightness(2);
    pointer-events:none;
    z-index:0;
  }
  .bg-grid{
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(91,138,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,138,255,0.035) 1px, transparent 1px);
    background-size: 46px 46px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 10%, transparent 75%);
    pointer-events:none;
    z-index:0;
  }
  .bg-glow{
    position:fixed; top:-10%; left:50%; transform:translateX(-50%);
    width:900px; height:900px;
    background: radial-gradient(circle, rgba(47,95,220,0.18), transparent 65%);
    pointer-events:none; z-index:0;
  }

  .app{ position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; }

  /* Topbar credits */
  .topbar{
    display:flex; justify-content:space-between; align-items:center;
    padding: 22px 34px;
    font-family:'Rajdhani', sans-serif;
    font-size:13px;
    letter-spacing:0.5px;
    color: var(--text-dim);
    position:relative;
  }
  .topbar-center{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center; }
  .credit{
    display:flex; align-items:center; gap:8px;
    padding:7px 14px;
    border:1px solid var(--line);
    border-radius: 30px;
    background: linear-gradient(180deg, rgba(20,28,46,0.6), rgba(10,14,24,0.4));
    backdrop-filter: blur(6px);
  }
  .credit b{ color: var(--blue-bright); font-weight:700; }
  .credit .dot{ width:5px;height:5px;border-radius:50%; background:var(--blue-bright); box-shadow:0 0 8px var(--blue-bright); }

  .owner-toggle{
    cursor:pointer; user-select:none;
    font-family:'Rajdhani', sans-serif;
    font-size:12px; color:var(--text-dim);
    border:1px solid var(--line); padding:7px 14px; border-radius:30px;
    transition:.2s;
  }
  .owner-toggle:hover{ color:var(--blue-bright); border-color:var(--blue-dim); }
  .owner-toggle.active{ color:#0a0e18; background:var(--blue-bright); border-color:var(--blue-bright); font-weight:700; }

  .log-btn{
    cursor:pointer; user-select:none;
    font-family:'Rajdhani',sans-serif; font-size:12px;
    color: var(--blue-bright);
    border:1px solid var(--blue-dim); padding:7px 14px; border-radius:30px;
    transition:.2s; background: rgba(91,138,255,0.08);
  }
  .log-btn:hover{ background: rgba(91,138,255,0.2); border-color:var(--blue-bright); }

  .hamburger-btn{
    width:42px; height:42px; border-radius:50%;
    background: linear-gradient(180deg, rgba(20,28,46,0.7), rgba(10,14,24,0.5));
    border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    cursor:pointer; transition:.2s;
  }
  .hamburger-btn:hover{ border-color: var(--blue-bright); }
  .hamburger-btn span{ width:16px; height:2px; background: var(--blue-bright); border-radius:2px; }

  .drawer-overlay{
    position:fixed; inset:0; z-index:90;
    background: rgba(2,4,10,0.7); backdrop-filter: blur(3px);
    display:flex; justify-content:flex-start;
    direction: ltr;
  }
  .drawer-panel{
    direction: rtl;
    width: min(320px, 86vw); height:100%;
    background: linear-gradient(180deg, #0d1320, #060a13);
    border-right:1px solid var(--line);
    padding:26px 20px; display:flex; flex-direction:column;
    animation: slideIn .25s ease;
  }
  @keyframes slideIn{ from{ transform: translateX(-100%); opacity:0; } to{ transform:translateX(0); opacity:1; } }
  .drawer-head{ display:flex; align-items:center; gap:12px; margin-bottom:26px; }
  .drawer-logo{ width:38px; height:38px; object-fit:contain; }
  .drawer-title{ font-weight:900; color:#fff; font-size:18px; flex:1; }
  .drawer-close{ cursor:pointer; color:var(--text-dim); font-size:18px; padding:6px; }
  .drawer-close:hover{ color:#fff; }
  .drawer-items{ display:flex; flex-direction:column; gap:12px; overflow-y:auto; flex:1; }
  .drawer-item{
    background: rgba(16,23,39,0.7); border:1px solid var(--line);
    border-radius:14px; padding:14px 18px; text-align:center;
    font-weight:700; cursor:pointer; transition:.2s; color:var(--text);
  }
  .drawer-item:hover{ border-color: var(--blue-bright); color:#fff; }
  .drawer-item.primary{ background: linear-gradient(135deg, var(--blue), var(--blue-dim)); color:#fff; border:none; }
  .drawer-item-wrap{ position:relative; display:flex; align-items:center; gap:8px; }
  .drawer-item-wrap .drawer-item{ flex:1; }
  .drawer-item-actions{ display:flex; gap:6px; }
  .drawer-action{
    width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:13px; flex-shrink:0;
    background: rgba(16,23,39,0.8); border:1px solid var(--line);
  }
  .drawer-action.edit{ color: var(--blue-bright); }
  .drawer-action.delete{ color:#ff7878; }
  .drawer-item.add-item{ border-style:dashed; border-color:var(--blue-dim); color:var(--blue-bright); }
  .drawer-discord{
    margin-top:18px; text-align:center; padding:14px; border-radius:14px;
    background: linear-gradient(135deg, #5865F2, #3a45c7); color:#fff; text-decoration:none; font-weight:700;
  }

  /* HERO / HOME */
  .hero{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding: 30px 20px 80px;
  }
  .logo-wrap{ position:relative; margin-bottom:18px; }
  .logo-wrap img{
    width:150px; height:150px; object-fit:contain;
    filter: drop-shadow(0 0 40px rgba(47,95,220,0.55));
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

  .brand-line{
    font-family:'Rajdhani', sans-serif;
    font-weight:700; font-size:14px; letter-spacing:8px;
    color: var(--blue-bright); text-transform:uppercase;
    margin-bottom:6px;
  }
  h1.title{
    font-size: clamp(42px, 9vw, 92px);
    font-weight:900;
    margin:0;
    letter-spacing:2px;
    background: linear-gradient(180deg, #ffffff 10%, #b9c8ef 55%, #5b8aff 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    line-height:1;
  }
  .subtitle{
    margin-top:14px; color:var(--text-dim); font-size:16px; max-width:560px;
    line-height:1.9;
  }

  .btn-row{ display:flex; gap:18px; margin-top:42px; flex-wrap:wrap; justify-content:center; }
  .btn{
    position:relative;
    display:flex; align-items:center; gap:10px;
    padding:16px 30px;
    border-radius:14px;
    font-family:'Tajawal', sans-serif;
    font-weight:700; font-size:16px;
    cursor:pointer; border:none; text-decoration:none;
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .btn:hover{ transform: translateY(-3px); }
  .btn-primary{
    background: linear-gradient(135deg, #5865F2, #3a45c7);
    color:#fff;
    box-shadow: 0 10px 30px -8px rgba(88,101,242,0.6);
  }
  .btn-primary:hover{ box-shadow: 0 14px 34px -6px rgba(88,101,242,0.8); }
  .btn-outline{
    background: rgba(16,23,39,0.7);
    color: var(--text);
    border: 1px solid var(--blue-dim);
    box-shadow: 0 10px 30px -10px rgba(47,95,220,0.35);
  }
  .btn-outline:hover{ border-color: var(--blue-bright); }
  .btn svg{ width:20px; height:20px; }

  .btn-red{
    background: linear-gradient(135deg, #e23636, #a31616);
    color:#ffffff;
    box-shadow: 0 10px 30px -8px rgba(226,54,54,0.6);
  }
  .btn-red:hover{ box-shadow: 0 14px 34px -6px rgba(226,54,54,0.8); }
  .btn-news{
    background: linear-gradient(135deg, #1a7a3a, #0f4d24);
    color:#fff;
    box-shadow: 0 10px 30px -8px rgba(26,122,58,0.6);
  }
  .btn-news:hover{ box-shadow: 0 14px 34px -6px rgba(26,122,58,0.8); }
  .btn-ticket{
    background: linear-gradient(135deg, #7c3aed, #4c1d95);
    color:#fff; box-shadow: 0 10px 30px -8px rgba(124,58,237,0.6);
  }
  .btn-ticket:hover{ box-shadow: 0 14px 34px -6px rgba(124,58,237,0.8); }

  .editable-inline{
    position:relative; display:inline-flex; align-items:center; gap:8px;
  }
  .editable-inline.owner-on{ outline:1px dashed rgba(91,138,255,0.3); outline-offset:6px; border-radius:8px; }
  .e-pen{
    display:none; width:28px; height:28px; border-radius:50%;
    background: var(--blue-bright); color:#08101f;
    align-items:center; justify-content:center; cursor:pointer;
    font-size:13px; border:2px solid var(--ink); flex-shrink:0;
    box-shadow:0 3px 12px rgba(91,138,255,0.45);
  }
  .editable-inline.owner-on .e-pen{ display:flex; }

  .extra-section{
    margin-top:28px; max-width:620px; width:100%; text-align:center;
    background: linear-gradient(160deg, rgba(16,23,39,0.6), rgba(8,11,20,0.5));
    border:1px solid var(--line); border-radius:16px; padding:24px 28px;
  }
  .extra-title{ margin:0 0 10px; color:var(--blue-bright); font-size:20px; }
  .extra-body{ margin:0; color:var(--silver); line-height:2; font-size:15px; }
  .extra-sec-actions{ display:flex; justify-content:flex-end; gap:8px; margin-bottom:10px; }
  .edit-pencil-sm{
    width:28px; height:28px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:13px; font-weight:700;
    background: rgba(91,138,255,0.15); color:var(--blue-bright); border:1px solid var(--line);
  }
  .edit-pencil-sm.red{ background: rgba(255,80,80,0.15); color:#ff7878; }
  .add-section-btn{
    margin-top:22px; display:inline-flex; align-items:center; gap:8px;
    padding:11px 22px; border-radius:12px; cursor:pointer;
    background: rgba(91,138,255,0.1); border:1px dashed var(--blue-bright);
    color:var(--blue-bright); font-weight:700; font-family:'Tajawal';
  }
  .add-section-btn:hover{ background: rgba(91,138,255,0.2); }

  /* News page */
  .news-list{ display:flex; flex-direction:column; gap:18px; }
  .news-card{
    position:relative;
    background: linear-gradient(160deg, rgba(16,23,39,0.85), rgba(8,11,20,0.75));
    border:1px solid var(--line); border-radius:18px; padding:26px 28px;
    transition:.2s;
  }
  .news-card:hover{ border-color: rgba(91,138,255,0.3); }
  .news-badge{
    display:inline-block; padding:3px 12px; border-radius:20px;
    background: rgba(91,138,255,0.15); border:1px solid var(--blue-dim);
    color:var(--blue-bright); font-size:11px; font-family:'Rajdhani',sans-serif;
    letter-spacing:1px; margin-bottom:12px;
  }
  .news-title{ margin:0 0 10px; font-size:20px; color:#fff; }
  .news-body{ margin:0; color:var(--silver); line-height:2; white-space:pre-wrap; font-size:15px; }
  .news-date{ color:var(--text-dim); font-size:12px; font-family:'Rajdhani',sans-serif; }
  .news-footer{ display:flex; align-items:center; justify-content:space-between; margin-top:14px; flex-wrap:wrap; gap:8px; }
  .news-publisher{ color:var(--blue-bright); font-size:12px; font-family:'Rajdhani',sans-serif; font-weight:700; }

  /* Activity log */
  .log-list{ display:flex; flex-direction:column; gap:10px; }
  .log-entry{
    display:flex; align-items:flex-start; gap:14px;
    background: rgba(16,23,39,0.6); border:1px solid var(--line);
    border-radius:12px; padding:14px 18px;
  }
  .log-avatar{
    width:36px; height:36px; border-radius:50%; flex-shrink:0;
    background: linear-gradient(135deg, var(--blue), var(--blue-dim));
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:15px; color:#fff;
  }
  .log-who{ color:var(--blue-bright); font-weight:700; font-size:14px; margin-bottom:3px; }
  .log-action{ color:var(--silver); font-size:14px; line-height:1.6; }
  .log-time{ color:var(--text-dim); font-size:11px; font-family:'Rajdhani',sans-serif; margin-top:4px; }

  .admin-code-display{
    background: rgba(0,0,0,0.4); border:1.5px solid var(--blue-bright);
    border-radius:12px; padding:18px; text-align:center;
    font-family:'Rajdhani',sans-serif; font-size:26px; font-weight:700;
    letter-spacing:5px; color:#fff; cursor:pointer; user-select:all;
    box-shadow: 0 0 24px rgba(91,138,255,0.3);
    margin-bottom:4px;
  }
  .admin-code-display:hover{ background: rgba(91,138,255,0.1); }
  .admin-code-hint{ color:var(--text-dim); font-size:11px; text-align:center; margin-bottom:14px; }

  /* Admins panel */
  .admins-panel{
    position:relative; z-index:80;
    margin: -10px 24px 10px;
    background: linear-gradient(160deg, #0d1320, #060a13);
    border:1px solid var(--line); border-radius:16px;
    overflow:hidden; animation: slideIn .2s ease;
  }
  .admins-panel-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 18px; border-bottom:1px solid var(--line);
    font-weight:700; color:#fff; font-family:'Rajdhani',sans-serif; font-size:15px;
  }
  .admins-close{ cursor:pointer; color:var(--text-dim); font-size:18px; padding:2px 6px; }
  .admins-close:hover{ color:#fff; }
  .admins-list{ display:grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap:1px; background:var(--line); }
  .admin-row{
    display:flex; align-items:center; gap:12px;
    padding:14px 18px; background:var(--ink2);
    transition:.15s;
  }
  .admin-row:hover{ background:var(--panel); }
  .admin-avatar{
    width:38px; height:38px; border-radius:50%; flex-shrink:0;
    background: linear-gradient(135deg, var(--blue), #8a5cf6);
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:16px; color:#fff;
  }
  .admin-name{ font-weight:700; color:#fff; font-size:14px; }
  .admin-discord{
    display:flex; align-items:center; gap:5px;
    color:#5865F2; font-size:12px; font-family:'Rajdhani',sans-serif;
    margin-top:3px;
  }
  .news-actions{ position:absolute; top:18px; left:18px; display:flex; gap:8px; }

  /* Image picker in modals */
  .img-picker-wrap{ margin-bottom:12px; }
  .img-upload-btn{
    display:block; width:100%; padding:13px; border:1.5px dashed var(--blue-dim); border-radius:10px;
    text-align:center; color:var(--blue-bright); cursor:pointer; font-weight:700;
    transition:.2s; font-family:'Tajawal'; font-size:15px; background:transparent;
  }
  .img-upload-btn:hover{ border-color:var(--blue-bright); background:rgba(91,138,255,0.08); }
  .img-preview{
    width:100%; max-height:200px; object-fit:cover; border-radius:10px;
    border:1px solid var(--line); margin-bottom:8px; display:block;
  }
  .img-remove-btn{
    background:rgba(255,80,80,0.15); border:1px solid rgba(255,80,80,0.3);
    color:#ff7878; padding:7px 16px; border-radius:8px; cursor:pointer;
    font-family:'Tajawal'; font-weight:700; font-size:13px; width:100%;
  }
  /* Card images */
  .card-img{
    width:100%; max-height:280px; object-fit:cover;
    border-radius:12px; margin-bottom:16px; display:block;
    border:1px solid var(--line);
  }

  .scroll-hint{
    margin-top:60px; color:var(--text-dim); font-size:12px;
    font-family:'Rajdhani',sans-serif; letter-spacing:3px; text-transform:uppercase;
    opacity:0.6;
  }

  .countdown-box{
    margin-top:46px;
    display:flex; flex-direction:column; align-items:center; gap:16px;
  }
  .countdown-label{
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:14px;
    letter-spacing:4px; text-transform:uppercase; color:var(--blue-bright);
  }
  .countdown-timer{ display:flex; gap:14px; }
  .cd-unit{
    background: linear-gradient(160deg, rgba(16,23,39,0.85), rgba(8,11,20,0.85));
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 18px;
    min-width:78px;
    text-align:center;
    box-shadow: 0 10px 26px -12px rgba(47,95,220,0.4);
  }
  .cd-unit span{
    display:block; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:30px;
    color:#fff; line-height:1;
  }
  .cd-unit small{ display:block; margin-top:6px; color:var(--text-dim); font-size:11px; letter-spacing:1px; }
  @media(max-width:480px){
    .countdown-timer{ gap:8px; }
    .cd-unit{ min-width:60px; padding:12px 10px; }
    .cd-unit span{ font-size:22px; }
  }

  /* RULES HUB */
  .page{ flex:1; padding: 50px 24px 100px; max-width:1100px; margin:0 auto; width:100%; }
  .page-head{ text-align:center; margin-bottom:48px; }
  .back-link{
    display:inline-flex; align-items:center; gap:6px;

const FIREBASE_URL = "https://arab-city-f4029-default-rtdb.firebaseio.com";

async function fbGet(path){
  const res = await fetch(`${FIREBASE_URL}/${path}.json`);
  if(!res.ok) throw new Error('fetch failed');
  return await res.json();
}
async function fbSet(path, value){
  const res = await fetch(`${FIREBASE_URL}/${path}.json`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(value)
  });
  if(!res.ok) throw new Error('save failed');
  return await res.json();
}

/* helper: Firebase converts arrays to objects — convert back */
function toArr(v){ return v ? (Array.isArray(v) ? v : Object.values(v)) : []; }

async function loadData(){
  // Safety timeout — always show UI after 6s even if Firebase hangs
  const safetyTimer = setTimeout(()=>{
    if(state.loading){
      state.loading = false;
      render();
    }
  }, 6000);
  try{
    const controller = new AbortController();
    const fetchTimer = setTimeout(()=> controller.abort(), 5000);
    const res = await fetch(`${FIREBASE_URL}/site.json`, { signal: controller.signal });
    clearTimeout(fetchTimer);
    if(res.ok){
      const data = await res.json();
      if(data){
        if(data.rules)      state.rules      = { ...DEFAULT_RULES, ...data.rules };
        if(data.password)   state.password   = data.password;
        if(data.logo)       state.logoDataUrl= data.logo;
        if(data.categories) state.categories = toArr(data.categories);
        if(data.youtubers)  state.youtubers  = toArr(data.youtubers);
        if(data.news)       state.news       = toArr(data.news);
        if(data.activityLog)state.activityLog= toArr(data.activityLog);
        if(data.adminCodes) state.adminCodes = data.adminCodes;
        if(data.menuItems){
          state.menuItems = toArr(data.menuItems).map(m=>({
            ...m, entries: toArr(m.entries)
          }));
        }
        if(data.home){
          state.home = { ...DEFAULT_HOME, ...data.home };
          if(data.home.extraSections) state.home.extraSections = toArr(data.home.extraSections);
        }
        if(data.announcement !== undefined) state.announcement = data.announcement;
      }
    }
  }catch(e){
    // Firebase unreachable (local file, CORS, no internet) — use defaults silently
    console.warn('Firebase unavailable, using defaults');
  }
  clearTimeout(safetyTimer);
  state.loading = false;
  render();
}

function generateCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = '';
  for(let i=0;i<12;i++){
    if(i>0 && i%4===0) c+='-';
    c += chars[Math.floor(Math.random()*chars.length)];
  }
  return c;
}

      const name = nameInput.value.trim();
      const pw   = document.getElementById('pwInput').value;
      if(!name){ document.getElementById('pwErr').textContent = 'الرجاء إدخال اسمك'; return; }
      if(pw !== state.password){ document.getElementById('pwErr').textContent = 'كلمة السر غير صحيحة'; return; }
      // Password correct — check if has stored admin code
      const stored = state.adminCodes[name];
      if(stored){ showStep2_verify(name, stored); }

    const newCode = generateCode();

            <button class="modal-btn save" id="confirmCode">تأكيد وتفعيل</button>
          </div>
        </div>

    document.getElementById('backBtn').onclick = showStep1;
    document.getElementById('ov').onclick = (e)=>{ if(e.target.id==='ov') closeModal(); };

      const entered = document.getElementById('codeConfirm').value.trim().toUpperCase().replace(/\s/g,'');
      const discord = document.getElementById('discordInput').value.trim();

      state.adminCodes[name] = { code: newCode, discord: discord || '—' };

/* ===== IMAGE UTILITY ===== */
function compressImage(file, maxW=1000, quality=0.78){
  return new Promise((resolve, reject)=>{
    if(!file){ reject('no file'); return; }
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ===== GLOBAL FILE INPUT (most reliable cross-browser approach) ===== */
let _imgCallback = null;
function setupGlobalFileInput(){
  const fi = document.getElementById('globalFileInput');
  if(!fi) return;
  fi.addEventListener('change', async function(){
    const f = this.files[0];
    this.value = '';  // reset so same file can be picked again
    if(!f || !_imgCallback) return;
    if(f.size > 8*1024*1024){ toast('الصورة كبيرة جدًا، الحد 8MB'); return; }
    try{
      const data = await compressImage(f);
      _imgCallback(data);
    }catch(e){ toast('تعذر قراءة الصورة'); }
  });
}

function pickImage(cb){
  _imgCallback = cb;
  const fi = document.getElementById('globalFileInput');
  if(fi) fi.click();
}

function imgPickerHTML(currentImg){
  const hasImg = currentImg && currentImg.length > 10;
  return `<div class="img-picker-wrap" id="imgPickerWrap">${hasImg
    ? `<img src="${currentImg}" class="img-preview" alt=""/><button type="button" class="img-remove-btn" id="imgRemoveBtn">✕ إزالة الصورة</button>`
    : `<button type="button" class="img-upload-btn" id="imgUploadBtn">📷 إضافة صورة (اختياري)</button>`
  }</div>`;
}

function bindImgPicker(currentImgRef){
  let imgData = (currentImgRef && currentImgRef.length > 10) ? currentImgRef : null;
  const wrap = document.getElementById('imgPickerWrap');
  if(!wrap) return { getImg:()=>imgData };

  function rebuild(){
    wrap.innerHTML = imgData
      ? `<img src="${imgData}" class="img-preview" alt=""/><button type="button" class="img-remove-btn" id="imgRemoveBtn">✕ إزالة الصورة</button>`
      : `<button type="button" class="img-upload-btn" id="imgUploadBtn">📷 إضافة صورة (اختياري)</button>`;
    wire();
  }
  function wire(){
    const up = document.getElementById('imgUploadBtn');
    if(up) up.addEventListener('click', (e)=>{
      e.preventDefault(); e.stopPropagation();
      pickImage(data=>{ imgData=data; rebuild(); });
    });
    const rm = document.getElementById('imgRemoveBtn');
    if(rm) rm.addEventListener('click', (e)=>{
      e.preventDefault(); e.stopPropagation();
      imgData=null; rebuild();
    });
  }
  wire();
  return { getImg:()=>imgData };
}

function renderAnnouncement(){
  const a = state.announcement;
  if(!a || !a.active || !a.text) return '';
  return `
    <div class="ann-banner" id="annBanner">
      ${escapeHtml(a.text)}
      <div class="ann-close" id="annClose">✕</div>
    </div>`;
}

function openAnnouncementModal(){
  const cur = state.announcement || { text:'', active:false };
  const root = document.getElementById('modalRoot');
  root.innerHTML = \`
    <div class="modal-overlay" id="ov">
      <div class="modal">
        <h3>📢 نشر خبر عام</h3>
        <p style="color:var(--text-dim);font-size:13px;margin-bottom:12px;">سيظهر الخبر للجميع أعلى الموقع بعد شاشة التحميل. يمكنك تعديله أو حذفه في أي وقت.</p>
        <textarea id="annText" placeholder="اكتب نص الخبر هنا..." style="min-height:100px;">\${escapeHtml(cur.text)}</textarea>
        <div class="modal-actions" style="flex-wrap:wrap;gap:8px;">
          <button class="modal-btn cancel" id="annCancel">إلغاء</button>
          \${cur.text ? \`<button class="modal-btn" id="annDelete" style="background:#e23636;color:#fff;border:none;">🗑 حذف الخبر</button>\` : ''}
          <button class="modal-btn save" id="annSave">📢 نشر</button>
        </div>
      </div>
    </div>\`;
  document.getElementById('annCancel').onclick = closeModal;
  document.getElementById('ov').onclick = (e)=>{ if(e.target.id==='ov') closeModal(); };
  const delBtn = document.getElementById('annDelete');
  if(delBtn) delBtn.onclick = async ()=>{
    state.announcement = { text:'', active:false };
    closeModal(); render();
    await saveAnnouncement();
    toast('تم حذف الخبر');
  };
  document.getElementById('annSave').onclick = async ()=>{
    const text = document.getElementById('annText').value.trim();
    if(!text){ toast('اكتب نص الخبر أولاً'); return; }
    state.announcement = { text, active:true };
    closeModal(); render();
    await saveAnnouncement();
    logAction('نشر خبر عام: ' + text.slice(0,40));
    toast('✅ تم نشر الخبر');
  };
}

function renderTopbar(){
  return `
    <div class="topbar">
      <div class="hamburger-btn" id="hamburgerBtn" title="القائمة">
        <span></span><span></span><span></span>
      </div>
      <div class="topbar-center">
        <div class="owner-toggle ${state.ownerMode?'active':''}" id="ownerBtn">
          ${state.ownerMode ? `🛡️ ${state.ownerName} — خروج` : '🔒 دخول الأونر'}
        </div>
        ${state.ownerMode ? `
          <div class="log-btn" id="logBtn">📋 اللوق</div>
          <div class="log-btn" id="adminsBtn">👥 الإداريين</div>
          <div class="log-btn" id="annBtn" style="background:rgba(47,95,220,0.15);border-color:#2f5fdc;">📢 خبر عام</div>` : ''}
      </div>
      <div style="width:42px;"></div>
    </div>
    ${state.ownerMode ? renderAdminsPanel() : ''}
    ${state.menuOpen ? renderDrawer() : ''}`;
}

function renderAdminsPanel(){
  if(!state.adminsOpen) return '';
  const codes = state.adminCodes || {};
  const admins = Object.entries(codes);
  return `
    <div class="admins-panel" id="adminsPanel">

function genTicketId(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let id = 'TKT';
  for(let i=0;i<7;i++) id += chars[Math.floor(Math.random()*chars.length)];
  return id;
}

function discordColor(name){
  const colors = ['#5865F2','#2f5fdc','#8a5cf6','#1a7a3a','#e23636','#e07b2f','#0099ff'];
  let hash = 0;
  for(let i=0;i<name.length;i++) hash = name.charCodeAt(i) + ((hash<<5)-hash);
  return colors[Math.abs(hash) % colors.length];
}

function formatRuleText(text){
  // bold lines starting with a number followed by - or .
  return escapeHtml(text).replace(/\n/g,'<br>').replace(/(\d+)([-.])/g, '<span class="rule-num">$1$2</span>');
}

let countdownInterval = null;
let ticketPollInterval = null;
function startCountdown(){
  if(countdownInterval) clearInterval(countdownInterval);
  function tick(){
    const target = new Date(state.home.countdownDate || OPENING_DATE).getTime();
    const now = Date.now();
    let diff = target - now;
    const elD = document.getElementById('cdDays');
    if(!elD) { clearInterval(countdownInterval); return; }
    if(diff <= 0){
      document.getElementById('cdDays').textContent = '00';
      document.getElementById('cdHours').textContent = '00';
      document.getElementById('cdMins').textContent = '00';
      document.getElementById('cdSecs').textContent = '00';
      document.getElementById('countdownTimer').previousElementSibling.textContent = 'الماب متاح الآن!';
      clearInterval(countdownInterval);
      return;
    }
    const d = Math.floor(diff/(1000*60*60*24));
    const h = Math.floor((diff/(1000*60*60))%24);
    const m = Math.floor((diff/(1000*60))%60);
    const s = Math.floor((diff/1000)%60);
    document.getElementById('cdDays').textContent = String(d).padStart(2,'0');
    document.getElementById('cdHours').textContent = String(h).padStart(2,'0');
    document.getElementById('cdMins').textContent = String(m).padStart(2,'0');
    document.getElementById('cdSecs').textContent = String(s).padStart(2,'0');
  }
  tick();
  countdownInterval = setInterval(tick, 1000);
}

function openCreateTicketModal(){
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
    <div class="modal-overlay" id="ov">
      <div class="modal">
        <h3>🎫 إنشاء تذكرة دعم</h3>

        <div class="modal-err" id="tkErr"></div>

          <button class="modal-btn cancel" id="tkCancel">إلغاء</button>
          <button class="modal-btn save" id="tkCreate">إنشاء التذكرة ✉️</button>
        </div>
      </div>
    </div>`;
  document.getElementById('tkCancel').onclick = closeModal;
  document.getElementById('ov').onclick = (e)=>{ if(e.target.id==='ov') closeModal(); };
  document.getElementById('tkUser').focus();
  document.getElementById('tkCreate').onclick = async ()=>{
    const user = document.getElementById('tkUser').value.trim();
    const msg  = document.getElementById('tkMsg').value.trim();
    const err  = document.getElementById('tkErr');
    if(!user){ err.textContent = 'الرجاء إدخال اسمك'; return; }
    if(!msg) { err.textContent = 'الرجاء كتابة رسالتك'; return; }
    err.textContent = 'جاري الإنشاء...';
    const id = genTicketId();
    const ticket = {
      id, userName: user, status:'open', claimedBy:'',
      createdAt: nowStr(),
      messages: {}
    };
    // first message
    const firstMsg = { from:'user', name:user, text:msg, time:nowStr(), ts:Date.now() };
    ticket.messages['msg0'] = firstMsg;
    await saveTicket(id, ticket);
    // verify saved
    const check = await loadOneTicket(id);
    if(!check){ err.textContent = '❌ فشل الحفظ — تأكد من Firebase Rules'; return; }
    try{
      let my = JSON.parse(localStorage.getItem('myTickets')||'[]');
      my.push({id, name:user});
      localStorage.setItem('myTickets', JSON.stringify(my));
    }catch(e){}
    closeModal();

async function loadAndRenderTicketList(){
  const container = document.getElementById('ticketListContainer');
  const infoBox   = document.getElementById('myTicketInfo');
  if(!container) return;

  const tickets = await loadTickets();
  const list = Object.values(tickets||{}).sort((a,b)=> (b.createdAt||'') > (a.createdAt||'') ? 1:-1);

  if(state.ownerMode){
    // Admin sees all
    if(!list.length){
      container.innerHTML = '<div class="empty-state" style="padding:40px;">لا توجد تذاكر حتى الآن</div>';
    } else {
      container.innerHTML = list.map(t=>{
        const msgs = Object.values(t.messages||{}).sort((a,b)=>{ if(a.ts&&b.ts) return a.ts-b.ts; return (a.time||'')<(b.time||'')?-1:1; });
        const last = msgs[msgs.length-1];
        return `
          <div class="ticket-card ${t.status||'open'}" data-tid="${t.id}">
            <div class="ticket-del-btn" data-del-tid="${t.id}" title="حذف">✕</div>
            <div class="ticket-top">
              <span class="ticket-id">${t.id}</span>
              <span class="ticket-status ${t.status||'open'}">${t.status==='closed'?'⚫ مغلق':'🟢 مفتوح'}</span>
            </div>
            <div class="ticket-user">👤 ${escapeHtml(t.userName||'')}</div>
            ${t.claimedBy ? `<div class="ticket-claimed-badge">📌 مُستلم بواسطة ${escapeHtml(t.claimedBy)}</div>` : ''}
            <div class="ticket-preview">${last ? escapeHtml(last.text||'').slice(0,80) : ''}</div>
            <div class="ticket-time">🕐 ${t.createdAt||''}</div>
          </div>`;
      }).join('');
    }
  } else {
    // User sees own tickets
    if(infoBox) infoBox.style.display = 'block';
    let myRaw = [];
    try{ myRaw = JSON.parse(localStorage.getItem('myTickets')||'[]'); }catch(e){}
    const myIds = myRaw.map(x=>x.id);
    // filter only tickets that still exist in Firebase
    const mine = list.filter(t=>myIds.includes(t.id));
    // clean localStorage if some tickets were deleted from Firebase
    if(mine.length !== myIds.length){
      try{ localStorage.setItem('myTickets', JSON.stringify(myRaw.filter(x=>mine.find(t=>t.id===x.id)))); }catch(e){}
    }
    if(!mine.length){
      container.innerHTML = '<div class="empty-state" style="padding:30px;color:var(--text-dim);">ليس لديك تذاكر سابقة.<br/>أنشئ تذكرة جديدة للتواصل مع الإدارة.</div>';
    } else {
      container.innerHTML = mine.map(t=>{
        const msgs = Object.values(t.messages||{}).sort((a,b)=>{ if(a.ts&&b.ts) return a.ts-b.ts; return (a.time||'')<(b.time||'')?-1:1; });
        const last = msgs[msgs.length-1];
        return `
          <div class="ticket-card ${t.status||'open'}" data-tid="${t.id}">
            <div class="ticket-top">
              <span class="ticket-id">${t.id}</span>
              <span class="ticket-status ${t.status||'open'}">${t.status==='closed'?'⚫ مغلق':'🟢 مفتوح'}</span>
            </div>
            <div class="ticket-user">📩 ${escapeHtml(t.userName||'')}</div>
            <div class="ticket-preview">${last ? escapeHtml(last.text||'').slice(0,80) : ''}</div>
            <div class="ticket-time">🕐 ${t.createdAt||''}</div>
          </div>`;
      }).join('');
    }
  }

  // bind cards
  container.querySelectorAll('.ticket-card[data-tid]').forEach(card=>{
    card.addEventListener('click',(e)=>{
      if(e.target.closest('[data-del-tid]')) return;
      go('ticket:'+card.dataset.tid);
    });
  });
  container.querySelectorAll('[data-del-tid]').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      confirmModal('حذف هذه التذكرة نهائياً؟', async ()=>{
        await deleteTicket(btn.dataset.delTid);
        toast('تم الحذف');
        loadAndRenderTicketList();
      });
    });
  });

  // open existing ticket by ID
  const openBtn = document.getElementById('openExistingTicket');
  if(openBtn) openBtn.onclick = ()=>{
    const id = (document.getElementById('ticketIdInput')?.value||'').trim().toUpperCase();
    if(id.startsWith('TKT') && id.length >= 7) go('ticket:'+id);
    else toast('رقم التذكرة غير صحيح');
  };
}

function startTicketChat(ticketId){
  let lastMsgCount = 0;

  async function loadChat(){
    const ticket = await loadOneTicket(ticketId);
    const msgs    = document.getElementById('chatMessages');
    const dot     = document.getElementById('chatStatusDot');
    const title   = document.getElementById('chatTitle');
    const bar     = document.getElementById('chatInputBar');
    const claimBtn= document.getElementById('claimTicketBtn');
    if(!msgs) return; // page changed

    if(!ticket){
      msgs.innerHTML = '<div style="text-align:center;color:#ff7878;padding:40px;font-size:15px;">❌ التذكرة غير موجودة أو تم حذفها.</div>';
      if(bar) bar.style.display='none';
      return;
    }

    const isClosed = ticket.status === 'closed';
    if(title) title.textContent = `🎫 ${ticket.id} — ${ticket.userName||''}`;
    if(dot){ dot.className='chat-status-dot'+(isClosed?' closed':''); }

    if(claimBtn){
      if(ticket.claimedBy){
        claimBtn.textContent = '📌 مُستلم: ' + ticket.claimedBy;
        claimBtn.className = 'chat-claim-btn claimed';
      } else {
        claimBtn.textContent = '📌 استلام التذكرة';
        claimBtn.className = 'chat-claim-btn';
      }
    }

    if(bar){
      if(isClosed){
        bar.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:14px;width:100%;font-size:14px;">🔒 التذكرة مغلقة</div>';
      }
    }

    const msgMap = ticket.messages || {};
    const msgArr = Object.values(msgMap).sort((a,b)=>{
      // Sort by timestamp property first, then fallback to time string
      if(a.ts && b.ts) return a.ts - b.ts;
      return (a.time||'') < (b.time||'') ? -1 : 1;
    });

    if(msgArr.length === lastMsgCount) return; // no change
    lastMsgCount = msgArr.length;

    const atBottom = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 80;
    msgs.innerHTML = msgArr.length ? msgArr.map(m=>{
      const isMe = (state.ownerMode && m.from==='admin') || (!state.ownerMode && m.from==='user');
      return `
        <div class="chat-msg ${isMe?'user':'admin'}">
          <div class="chat-bubble">${escapeHtml(m.text||'')}</div>
          <div class="chat-msg-meta">${escapeHtml(m.name||'')} · ${m.time||''}</div>
        </div>`;
    }).join('')
    : '<div style="text-align:center;color:var(--text-dim);padding:30px;font-size:14px;">لا توجد رسائل بعد</div>';

    if(atBottom) msgs.scrollTop = msgs.scrollHeight;
  }

  async function sendMsg(){
    const input = document.getElementById('chatInput');
    if(!input) return;
    const text = input.value.trim();
    if(!text) return;
    input.value = ''; input.style.height='auto';

    const ticket = await loadOneTicket(ticketId);
    if(!ticket){ toast('التذكرة غير موجودة'); return; }
    if(ticket.status==='closed'){ toast('التذكرة مغلقة'); return; }

    const name = state.ownerMode ? (state.ownerName||'الإدارة')
      : (state.currentUserName || (()=>{ try{ return JSON.parse(localStorage.getItem('myTickets')||'[]').find(x=>x.id===ticketId)?.name||'مستخدم'; }catch(e){ return 'مستخدم'; } })());
    const from = state.ownerMode ? 'admin' : 'user';

    const ok = await pushMessage(ticketId, {from, name, text, time:nowStr(), ts:Date.now()});
    if(!ok) toast('خطأ في إرسال الرسالة');
    else loadChat();
  }

  loadChat();
  if(ticketPollInterval) clearInterval(ticketPollInterval);
  ticketPollInterval = setInterval(loadChat, 3500);

  setTimeout(()=>{
    const sendBtn = document.getElementById('sendMsgBtn');
    if(sendBtn) sendBtn.addEventListener('click', sendMsg);
    const input = document.getElementById('chatInput');
    if(input){
      input.addEventListener('keydown',(e)=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });
      input.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
    }
    const closeBtn = document.getElementById('closeTicketBtn');
    if(closeBtn) closeBtn.addEventListener('click', async ()=>{
      confirmModal('إغلاق هذه التذكرة؟', async ()=>{
        const t = await loadOneTicket(ticketId);
        if(t){ t.status='closed'; await saveTicket(ticketId,t); toast('تم إغلاق التذكرة'); go('tickets'); }
      });
    });
    const claimBtn = document.getElementById('claimTicketBtn');
    if(claimBtn) claimBtn.addEventListener('click', async ()=>{
      const t = await loadOneTicket(ticketId);
      if(!t) return;
      if(t.claimedBy === state.ownerName){ t.claimedBy=''; toast('تم إلغاء الاستلام'); }
      else { t.claimedBy = state.ownerName; toast('تم استلام التذكرة ✅'); }
      await saveTicket(ticketId, t);
      loadChat();
    });
  }, 150);
}



</script>
</body>
</html>
